steps:
  - name: 'node:22-alpine'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        npm install -g pnpm@10
        pnpm install --frozen-lockfile

  - name: 'node:22-alpine'
    entrypoint: 'sh'
    args: ['-c', 'pnpm lint']

  - name: 'node:22-alpine'
    entrypoint: 'sh'
    args: ['-c', 'pnpm exec tsc --noEmit']

  - name: 'node:22-alpine'
    entrypoint: 'sh'
    args: ['-c', 'pnpm test:unit']

  - name: 'node:22-alpine'
    entrypoint: 'sh'
    args: ['-c', 'pnpm test:integration']

  - name: 'node:22-alpine'
    entrypoint: 'sh'
    args: ['-c', 'pnpm build']

  - name: 'node:22-alpine'
    entrypoint: 'sh'
    args: ['-c', 'pnpm audit --audit-level=high || true']

  # Docker build and push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_IMAGE}:${SHORT_SHA}'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_IMAGE}:${SHORT_SHA}'

substitutions:
  _REGION: 'europe-west1'
  _REPOSITORY: 'app'
  _IMAGE: 'api'

options:
  logging: CLOUD_LOGGING_ONLY
